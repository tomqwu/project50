services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: project50
      POSTGRES_PASSWORD: project50
      POSTGRES_DB: project50
    ports: ["5432:5432"]
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
