# Staging stack (issue #22) — mirrors the prod service shape, locally runnable.
#
# This is the *local* staging stack: it stands up the same four moving parts a
# cloud staging deploy has — web app, Postgres 16, a PgBouncer connection pooler
# (issue #18), and S3-compatible object storage (MinIO) — wired together so you
# can validate the full topology before pointing the app at managed cloud
# services. See docs/INFRA-STAGING.md for the cloud path and how this mirrors
# prod (the prod web host is Vercel per docs/DEPLOY.md; here we run the same
# Next.js build in a container).
#
# Usage:
#   cp .env.staging.example .env.staging   # then fill in values (NEVER commit)
#   docker compose --env-file .env.staging -f docker-compose.staging.yml up --build
#
# Secrets: every value comes from .env.staging (git-ignored). This file and the
# committed pgbouncer.ini contain NO secrets. See docs/SECRETS.md.

name: project50-staging

services:
  # --- Postgres 16: the real database backend (matches docker-compose.yml) ---
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-project50}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
      POSTGRES_DB: ${POSTGRES_DB:-project50}
    # Not published to the host by default — the app reaches Postgres only
    # through the pooler. Uncomment to run migrations from the host directly.
    # ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-project50} -d ${POSTGRES_DB:-project50}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- PgBouncer: transaction-mode connection pooler in front of Postgres ---
  # (issue #18). The app's DATABASE_URL points HERE (port 6432), not at
  # Postgres directly. Config lives in infra/pgbouncer/pgbouncer.ini; the
  # edoburu/pgbouncer image renders a userlist from the env vars below at start
  # (so no credential is committed). DIRECT_URL for migrations bypasses this and
  # talks to Postgres directly — see docs/INFRA-STAGING.md.
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1-p2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # The image generates /etc/pgbouncer/userlist.txt from these at startup.
      DB_USER: ${POSTGRES_USER:-project50}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB:-project50}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "20"
      LISTEN_PORT: "6432"
    # Mount our reviewed pooler config so the committed tuning is authoritative.
    # (The image's env vars above seed the userlist + defaults; pgbouncer.ini
    # documents and pins the pool tuning. Keep the two in sync.)
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    ports: ["6432:6432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U ${POSTGRES_USER:-project50}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- MinIO: S3-compatible object storage (matches docker-compose.yml) ---
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?set S3_SECRET_KEY in .env.staging}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- One-shot: create the media bucket so the web app has somewhere to write.
  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY} &&
      mc mb --ignore-existing local/${S3_BUCKET:-project50-media} &&
      mc anonymous set download local/${S3_BUCKET:-project50-media} &&
      echo 'bucket ready';
      "
    restart: "no"

  # --- Web app: the same Next.js build that ships to prod, run in a container.
  # Built from apps/web via the Node toolchain (no Dockerfile is added to the
  # repo — app code is out of scope here; the build steps are inlined). The app
  # talks to Postgres ONLY through PgBouncer (DATABASE_URL) and runs
  # `prisma migrate deploy` against DIRECT_URL before starting.
  web:
    image: node:20-bookworm-slim
    restart: unless-stopped
    working_dir: /app
    depends_on:
      pgbouncer:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      # Pooled connection for the running app (PgBouncer, transaction mode).
      DATABASE_URL: ${DATABASE_URL}
      # Direct connection for `prisma migrate deploy` (bypasses the pooler).
      DIRECT_URL: ${DIRECT_URL}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env.staging}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-project50-media}
      NODE_ENV: production
    volumes:
      - .:/app
    # corepack pins pnpm@9 (matches packageManager in package.json). We install,
    # generate the Prisma client, apply migrations via DIRECT_URL, build, start.
    command: >
      /bin/sh -c "
      corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @project50/db exec prisma generate &&
      pnpm --filter @project50/db exec prisma migrate deploy &&
      pnpm --filter @project50/web build &&
      pnpm --filter @project50/web start -- -H 0.0.0.0 -p 3000
      "
    ports: ["3000:3000"]

volumes:
  pgdata:
  minio:
