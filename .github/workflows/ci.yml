name: CI
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: project50
          POSTGRES_PASSWORD: project50
          POSTGRES_DB: project50
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://project50:project50@localhost:5432/project50?schema=public
      AUTH_SECRET: ci-secret
      S3_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: project50-media
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Start MinIO before running tests (GitHub services cannot run "minio server /data")
      - name: Start MinIO
        run: |
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          # Wait for MinIO to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "MinIO ready"
              break
            fi
            sleep 2
          done
      - run: pnpm --filter @project50/db exec prisma generate
      - run: pnpm --filter @project50/db exec prisma migrate deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm --filter @project50/web exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          # Use the fake renderer in e2e — no heavy Chromium Remotion render in CI
          RECAP_FAKE: "1"

  mobile:
    name: Mobile (headless Jest — no simulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm --filter @project50/mobile typecheck
      - name: Lint
        run: pnpm --filter @project50/mobile lint
      - name: Test (Jest + RNTL — runs in Node, no device needed)
        run: pnpm --filter @project50/mobile test
