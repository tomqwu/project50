# Scheduled offsite Postgres backup — pg_dump -> Azure Blob, with retention.
#
# Implements #272 (Automated Postgres backups + tested restore drill): the
# `pg-backup` job dumps the PROD Azure Postgres Flexible Server and uploads the
# dump to an Azure Blob container. The tested-restore DRILL and its runbook live
# in docs/BACKUPS.md + scripts/pg-restore-drill.sh (the operator runs it with
# `az` access — it cannot run against prod from CI here).
#
# DESIGN NOTES
# ------------
# INERT until secrets are configured, exactly like deploy.yml. A `preflight` job
# surfaces secret presence as a boolean output (secrets cannot be referenced in
# job-level `if:`), and the backup job is gated on it. On a fork or before the
# secrets exist the job is SKIPPED (not failed), so CI stays green and nothing
# runs — we never claim a backup ran that didn't.
#
# Two ways to provide the connection, checked in order by scripts/pg-backup.sh:
#   1. AZURE login (preferred) — `azure/login` with the federated OIDC secrets
#      below, then the script reads `database-url-admin` straight from Key Vault.
#   2. DATABASE_URL repo secret — a direct admin conn string (no Azure login).
#
# Required repository secrets (a connection path + the blob target):
#   Connection, EITHER:
#     AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
#                         Federated-credential login (OIDC, no client secret).
#                         The app registration needs: Key Vault Secrets User on
#                         kv-project50-dev-6z7n AND Storage Blob Data Contributor
#                         on the backup container.
#     KEY_VAULT_NAME      (optional) override; default kv-project50-dev-6z7n.
#   OR:
#     DATABASE_URL        Admin Postgres conn string (sslmode=require).
#   Blob target:
#     BACKUP_STORAGE_ACCOUNT  Storage account for dumps (e.g. stp50backupszv34o5).
#     BACKUP_CONTAINER        (optional) container; default db-backups.
#     BACKUP_RETENTION_DAYS   (optional) daily dumps to keep; default 14.
#
# See docs/BACKUPS.md and infra/azure/README.md for setup + the restore drill.

name: Backup

on:
  # Daily at 03:17 UTC (off-peak; odd minute avoids the top-of-hour stampede).
  schedule:
    - cron: "17 3 * * *"
  # Allow on-demand backups from the Actions tab.
  workflow_dispatch: {}

concurrency:
  # One backup run at a time; do not cancel an in-flight backup.
  group: backup
  cancel-in-progress: false

permissions:
  contents: read
  # Required for azure/login federated (OIDC) auth.
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: resolve whether enough secrets are present to take a backup, as a
  # boolean output. Need a connection path (Azure login OR DATABASE_URL) AND a
  # blob target. Downstream reads this so the pipeline is inert without secrets.
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight (secret gate)
    runs-on: ubuntu-latest
    outputs:
      has_backup: ${{ steps.check.outputs.has_backup }}
      use_azure_login: ${{ steps.check.outputs.use_azure_login }}
    steps:
      - id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_STORAGE_ACCOUNT: ${{ secrets.BACKUP_STORAGE_ACCOUNT }}
        run: |
          use_azure="false"
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            use_azure="true"
          fi
          has_conn="false"
          if [ "$use_azure" = "true" ] || [ -n "$DATABASE_URL" ]; then
            has_conn="true"
          fi
          if [ "$has_conn" = "true" ] && [ -n "$BACKUP_STORAGE_ACCOUNT" ]; then
            echo "has_backup=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backup=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Backup secrets not set (need an Azure-login OR DATABASE_URL connection, plus BACKUP_STORAGE_ACCOUNT) — pg-backup will be skipped."
          fi
          echo "use_azure_login=${use_azure}" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # #272 — Postgres logical backup -> Azure Blob. Inert without secrets.
  # ---------------------------------------------------------------------------
  pg-backup:
    name: Postgres backup (pg_dump -> Azure Blob)
    needs: preflight
    if: needs.preflight.outputs.has_backup == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
      BACKUP_STORAGE_ACCOUNT: ${{ secrets.BACKUP_STORAGE_ACCOUNT }}
      BACKUP_CONTAINER: ${{ secrets.BACKUP_CONTAINER }}
      BACKUP_RETENTION_DAYS: ${{ secrets.BACKUP_RETENTION_DAYS }}
    steps:
      - uses: actions/checkout@v6
      # Azure login (federated OIDC) so the script can read the admin conn string
      # from Key Vault and upload to Blob with --auth-mode login. Skipped when the
      # operator instead supplies a DATABASE_URL secret directly.
      - name: Azure login (federated)
        if: needs.preflight.outputs.use_azure_login == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # pg_dump runs inside the postgres:16 docker image (preinstalled on the
      # runner) so its major >= the prod server (16); az CLI is preinstalled too.
      - name: Run backup
        run: ./scripts/pg-backup.sh
