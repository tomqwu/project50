# Scheduled offsite Postgres backup — pg_dump -> Azure Blob, with retention.
#
# Implements #272 (Automated Postgres backups + tested restore drill): the
# `pg-backup` job dumps the PROD Azure Postgres Flexible Server and uploads the
# dump to an Azure Blob container (with retention). The tested-restore DRILL +
# runbook live in docs/BACKUPS.md + scripts/pg-restore-drill.sh (the operator
# runs it with `az` access — it cannot run against prod from CI here).
#
# Media (user photos / recap MP4s) backup is tracked SEPARATELY in #320; this
# workflow covers Postgres only.
#
# DESIGN NOTES
# ------------
# INERT until secrets are configured, exactly like deploy.yml. A `preflight` job
# surfaces secret presence as a boolean output (secrets cannot be referenced in
# job-level `if:`), and the backup job is gated on it. On a fork or before the
# secrets exist the job is SKIPPED (not failed), so CI stays green and nothing
# runs — we never claim a backup ran that didn't.
#
# The Blob upload uses `az storage blob upload --auth-mode login`, which REQUIRES
# an Azure login on the runner. So the CI workflow ALWAYS uses `azure/login`
# (federated OIDC) — the OIDC creds are mandatory.
#
# The scheduled backup ALWAYS reads the dump connection from the Key Vault secret
# `database-url-admin` (the prod ADMIN URL) — the single source of truth. It does
# NOT reuse the shared `DATABASE_URL` repo secret: that one is the APP/pooler
# connection (least-priv `p50app` role, possibly a pooler host / Prisma-only
# params) and is the WRONG connection/role for `pg_dump`. The federated login
# already grants Key Vault access, so no DB conn string is passed into CI at all.
#
# Required repository secrets (ALL of these — the workflow stays inert otherwise):
#   AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID
#                         Federated-credential login (OIDC, no client secret).
#                         The app registration needs: Key Vault Secrets User on
#                         kv-project50-dev-6z7n AND Storage Blob Data Contributor
#                         on the backup container. The script reads the admin
#                         conn string from `database-url-admin` in Key Vault.
#   BACKUP_STORAGE_ACCOUNT  Storage account for dumps (e.g. stp50backupszv34o5).
# Optional:
#   KEY_VAULT_NAME          override; default kv-project50-dev-6z7n.
#   BACKUP_CONTAINER        container; default db-backups.
#   BACKUP_RETENTION_DAYS   daily dumps to keep; default 14.
#
# (The local operator path of scripts/pg-backup.sh additionally accepts an
# explicit DATABASE_URL env to override the KV read — NOT wired into CI here.)
#
# See docs/BACKUPS.md and infra/azure/README.md for setup + the restore drill.

name: Backup

on:
  # Daily at 03:17 UTC (off-peak; odd minute avoids the top-of-hour stampede).
  schedule:
    - cron: "17 3 * * *"
  # Allow on-demand backups from the Actions tab.
  workflow_dispatch: {}

concurrency:
  # One backup run at a time; do not cancel an in-flight backup.
  group: backup
  cancel-in-progress: false

permissions:
  contents: read
  # Required for azure/login federated (OIDC) auth.
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: resolve whether enough secrets are present to take a backup, as a
  # boolean output. The Blob upload needs `az login` and the dump connection
  # comes from Key Vault, so CI REQUIRES the Azure federated (OIDC) creds AND the
  # storage account. Without all of them the pipeline is inert (skipped, not
  # failed). No DB conn string is gated on / passed — the admin URL is read from
  # the `database-url-admin` Key Vault secret at run time.
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight (secret gate)
    runs-on: ubuntu-latest
    outputs:
      has_backup: ${{ steps.check.outputs.has_backup }}
    steps:
      - id: check
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          BACKUP_STORAGE_ACCOUNT: ${{ secrets.BACKUP_STORAGE_ACCOUNT }}
        run: |
          # Require the full Azure-login set (Blob upload authenticates via it)
          # AND the storage account. Anything missing => inert/skipped.
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] \
             && [ -n "$AZURE_SUBSCRIPTION_ID" ] && [ -n "$BACKUP_STORAGE_ACCOUNT" ]; then
            echo "has_backup=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_backup=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Backup secrets not set (need AZURE_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID for azure/login — the Blob upload authenticates via it — plus BACKUP_STORAGE_ACCOUNT) — pg-backup will be skipped."
          fi

  # ---------------------------------------------------------------------------
  # #272 — Postgres logical backup -> Azure Blob. Inert without secrets.
  # ---------------------------------------------------------------------------
  pg-backup:
    name: Postgres backup (pg_dump -> Azure Blob)
    needs: preflight
    if: needs.preflight.outputs.has_backup == 'true'
    runs-on: ubuntu-latest
    env:
      # NB: no DATABASE_URL — the backup reads the prod ADMIN conn string from the
      # Key Vault `database-url-admin` secret (single source of truth). The shared
      # DATABASE_URL is the app/pooler (p50app) connection, wrong for pg_dump.
      KEY_VAULT_NAME: ${{ secrets.KEY_VAULT_NAME }}
      BACKUP_STORAGE_ACCOUNT: ${{ secrets.BACKUP_STORAGE_ACCOUNT }}
      BACKUP_CONTAINER: ${{ secrets.BACKUP_CONTAINER }}
      BACKUP_RETENTION_DAYS: ${{ secrets.BACKUP_RETENTION_DAYS }}
    steps:
      - uses: actions/checkout@v6
      # Azure login (federated OIDC) — REQUIRED: the script reads the admin conn
      # string from Key Vault and uploads to Blob with --auth-mode login, both of
      # which need an authenticated `az`. The preflight gate guarantees these
      # creds are present before this job runs.
      - name: Azure login (federated)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # pg_dump runs inside the postgres:16 docker image (preinstalled on the
      # runner) so its major >= the prod server (16); az CLI is preinstalled too.
      - name: Run backup
        run: ./scripts/pg-backup.sh
