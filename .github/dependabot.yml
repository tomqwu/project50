# Dependabot — automated dependency-update PRs (M0 #33, foundation).
# pnpm monorepo: the npm ecosystem reads the root pnpm-lock.yaml and covers all
# workspaces.
#
# Tuned to stay quiet: major-version bumps are IGNORED here (they need deliberate,
# individually-validated migrations — e.g. vitest 2→4, next 15→16, prisma 5→7),
# and non-major updates are batched into a single weekly grouped PR. Security
# updates are exempt from the major-ignore and still come through, so real
# advisories aren't held back.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      # One batched PR/week for all non-major bumps.
      non-major:
        update-types:
          - minor
          - patch
    ignore:
      # No automatic major bumps — they break the toolchain and need a real migration.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # Expo SDK pins these RN/Expo-ecosystem packages to exact versions per SDK
      # release. They must be upgraded together via `expo install` during a
      # deliberate Expo SDK bump — piecemeal minor/patch bumps break the native
      # iOS/Android build and the jest-expo preset (the failed grouped PR #329:
      # expo-asset 11.0.5->11.1.7 undid the SDK-52 pin from #326, expo-notifications
      # 0.29->0.32, @sentry/react-native 6.10->6.22). They move with the SDK, not
      # on dependabot's schedule.
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@react-native-async-storage/*"
      - dependency-name: "@react-native-community/*"
      - dependency-name: "@react-navigation/*"
      - dependency-name: "@sentry/react-native"
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
