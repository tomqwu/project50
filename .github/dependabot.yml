# Dependabot — automated dependency-update PRs (M0 #33, foundation).
# pnpm monorepo: the npm ecosystem reads the root pnpm-lock.yaml and covers all
# workspaces. Updates are grouped to keep PR volume manageable; security updates
# still come through individually so they aren't held back by a group.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Non-major bumps batched into one PR per week to reduce noise.
      minor-and-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    commit-message:
      prefix: chore(deps)

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore(ci)
