;; PgBouncer connection pooler — staging (issue #18).
;;
;; This config fronts the Postgres 16 service with a transaction-mode pool so
;; the web app (and any serverless/edge runtime in the cloud path) can open
;; many short-lived Prisma connections without exhausting Postgres' own
;; `max_connections`. See docs/INFRA-STAGING.md for the full rationale and the
;; cloud equivalents (Supabase pooler / Neon pooler / RDS Proxy / PgBouncer).
;;
;; Auth note: this file is committed and MUST NOT contain credentials. The
;; userlist (md5/scram entries) is mounted separately from `userlist.txt`,
;; which is rendered from .env.staging at container start and is git-ignored.
;; docker-compose.staging.yml generates it via the pgbouncer image's env-based
;; auth (AUTH_TYPE + auth_file), so no secret lands in this committed file.

[databases]
;; Map the logical DB name the app connects to ("project50") onto the real
;; Postgres backend. `host=postgres` resolves to the compose service.
project50 = host=postgres port=5432 dbname=project50

[pgbouncer]
;; --- Listener ---
listen_addr = 0.0.0.0
listen_port = 6432

;; --- Auth ---
;; scram-sha-256 matches Postgres 16's default password encoding.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

;; --- Pooling ---
;; transaction mode: a server connection is assigned to a client only for the
;; duration of a transaction, then returned to the pool. This is the right mode
;; for Prisma / serverless because it multiplexes thousands of short client
;; connections onto a small backend pool.
;;
;; IMPORTANT (Prisma): transaction-mode pools do NOT support session-level
;; features or (by default) prepared statements. Prisma must therefore connect
;; through the pooler with `?pgbouncer=true` and use a separate DIRECT_URL for
;; migrations. See docs/INFRA-STAGING.md §"Prisma + PgBouncer".
pool_mode = transaction

;; Backend connections PgBouncer keeps open to Postgres, per (user, db) pair.
;; Keep this comfortably below Postgres `max_connections` (default 100) so the
;; DB always has headroom for admin/migration/direct connections.
default_pool_size = 20

;; Extra backends opened briefly under load spikes, beyond default_pool_size.
reserve_pool_size = 5
reserve_pool_timeout = 3

;; Hard ceiling on client-side connections PgBouncer will accept. This is the
;; number the app may "see" as available — it can far exceed default_pool_size
;; because clients are multiplexed.
max_client_conn = 200

;; Cap total backend server connections across all pools as a safety net.
max_db_connections = 50

;; --- Timeouts / hygiene ---
;; Recycle idle backends so we don't pin Postgres connections indefinitely.
server_idle_timeout = 600
;; Close clients that sit idle inside a transaction (connection-leak guard).
idle_transaction_timeout = 60

;; --- Admin / logging ---
;; Roles allowed to run SHOW / PAUSE on the special "pgbouncer" admin DB.
admin_users = project50
ignore_startup_parameters = extra_float_digits
